name: Daily India Stock Scan
on:
  schedule:
    - cron: '30 11 * * 1-5'   # 11:30 UTC, Mon-Fri = 5:00 PM IST, after NSE market close
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yfinance pandas curl_cffi
      - run: python india_scan_email.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
